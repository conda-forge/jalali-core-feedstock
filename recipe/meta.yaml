{% set name = "jalali-core" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jalali_core-{{ version }}.tar.gz
  sha256: f4287c70c630323dcf0a3ab26df905ba4d451e230ac1f65b3bb2f77797894a2b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - jalali_core
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/slashmili/jalali-core
  summary: a Gregorian to Jalali and inverse date convertor
  license: LGPLLR
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
